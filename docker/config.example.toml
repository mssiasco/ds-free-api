[server]
host = "127.0.0.1"
port = 22217

# CORS allowed origin list (default: ["http://localhost:22217"])
# cors_origins = ["http://localhost:22217"]

# API Key and admin password are configured via the Web admin panel (http://127.0.0.1:22217/admin)
# [[api_keys]]
# key = "sk-test"
# description = "Development testing"

[ds_core]
# Account pool ([[ds_core.accounts]])
# Email login example
# [[ds_core.accounts]]
# email = "user1@example.com"
# mobile = ""
# area_code = ""
# password = "pass1"

# Chinese mobile number login example
# [[ds_core.accounts]]
# email = ""
# mobile = "13800138000"
# area_code = "+86"
# password = "pass2"

# Verified User-Agent (Android client simulation)
# user_agent = "DeepSeek/2.1.1 Android/35"

# API base URL (default)
# api_base = "https://chat.deepseek.com/api/v0"

# Full WASM file URL (required for PoW computation, version changes over time, manual update recommended)
# wasm_url = "https://fe-static.deepseek.com/chat/static/sha3_wasm_bg.7b9ca65ddd.wasm"

# X-Client-Version request header (used for expert model and other features)
# client_version = "2.0.0"

# X-Client-Platform request header
# client_platform = "android"

# X-Client-Locale request header
# client_locale = "zh_CN"

# Proxy configuration (optional, bypasses CloudFront WAF regional restrictions)
# Using a proxy exit node outside the US region avoids WAF Challenge
# [proxy]
# url = "http://127.0.0.1:7890"
# url = "socks5://127.0.0.1:7891"

# Supported model type list, default value is ["default", "expert", "vision"]
# model_types = ["default", "expert", "vision"]
# max_input_tokens = [1048576, 1048576, 1048576]
# max_output_tokens = [384000, 384000, 384000]
# input_character_limits = [2621440, 163840, 2621440]

# Model aliases (optional, aligned by index with model_types, no aliases by default)
# model_aliases = []

# Tool call tag configuration
# Built-in fuzzy matching: fullwidth `|` (U+FF5C) and `▁` (U+2581) are equivalent to ASCII `|` and `_`,
# automatically covering most character-level hallucination variants.
# extra is for fallback tags with completely different formats (e.g. <tool_call>):
# tool_call.extra_starts = ["<|tool_call_begin|>", "<tool_calls>", "<tool_call>"]
# tool_call.extra_ends = ["<|tool_call_end|>", "</tool_calls>", "</tool_call>"]

# Admin configuration (automatically managed by the admin panel, no manual entry needed for deployment)
# [admin]
# password_hash = ""
# jwt_secret = ""
# jwt_issued_at = 0
